name: ELIAKIM MD Bot — 24/7

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install
      - name: Start ELIAKIM MD Bot
        run: |
          while true; do
            echo "🚀 Starting bot at $(date)"
            node src/index.js || true
            echo "🔄 Restarting in 5s..."
            sleep 5
          done
