name: ELIAKIM MD Bot

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *' # Keep alive

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm install
      - name: Build App
        run: npm run build
      - name: Start Bot
        run: npm start
